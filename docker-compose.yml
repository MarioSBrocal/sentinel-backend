services:
  db:
    image: postgres:16-alpine
    container_name: sentinel_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sentinel_db
    ports:
      - "5432:5432"
    volumes:
      - sentinel_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sentinel_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: sentinel_api
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    env_file:
      - .env

  worker:
    build: .
    container_name: sentinel_worker
    command: uv run taskiq worker app.worker.broker:broker app.worker.tasks
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    env_file:
      - .env

  scheduler:
    build: .
    container_name: sentinel_scheduler
    command: uv run taskiq scheduler app.worker.scheduler:scheduler
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    env_file:
      - .env

volumes:
  sentinel_pg_data: